<div class="container" novalidate>
	<header color="primary">
		<h3>Update Rates</h3>
	</header>

	<ngx-spinner template="<img src='/assets/icons/spinner.gif' />"></ngx-spinner>

	<form [formGroup]="rateForm" class="rate-edit-form" (ngSubmit)="onSubmit()">
		<div *ngFor="let groupName of groupFormArrayNames">
			<h4>{{groupName}}</h4>
			<div class="rate-fields-grid" [formArrayName]="groupName">
				<div *ngFor="let itemControl of getGroupFormArrayControls(groupName).controls">
					<ng-container [formGroup]="itemControl">
						<div class="item-rates">
							<mat-form-field appearance="outline" class="item-form-field">
								<mat-label>{{itemControl.get('name').value}}</mat-label>
								<input matInput formControlName="rate" type="number" min="0" max="9999">
								<span matPrefix>&#x20B9;&nbsp;</span>
							</mat-form-field>
						</div>
					</ng-container>
				</div>
			</div>
		</div>
		<div>
			<button mat-raised-button color="primary" type="submit" class="button" [disabled]="!rateForm.valid">Update Rates</button>
			<span class="space-5px"></span>
			<button mat-raised-button type="button" (click)="onCancel()">Cancel</button>
		</div>
	</form>
</div>
